<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <linearGradient id="keys_sky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2A90D0"/><stop offset="55%" stop-color="#80C8F0"/><stop offset="100%" stop-color="#C0E8F8"/></linearGradient>
    <linearGradient id="keys_ocean" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1A8CC8"/><stop offset="100%" stop-color="#0A5888"/></linearGradient>
    <linearGradient id="keys_glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C8E8F8" stop-opacity="0.85"/><stop offset="100%" stop-color="#90C0E0" stop-opacity="0.65"/></linearGradient>
  </defs>
  <rect width="700" height="520" fill="url(#keys_sky)"/>

  <!-- Ocean -->
  <rect y="340" width="700" height="180" fill="url(#keys_ocean)"/>
  <!-- Water layers -->
  <path d="M0 352 Q88 338 175 352 Q263 366 350 352 Q438 338 525 352 Q613 366 700 352" fill="rgba(255,255,255,0.15)"/>
  <path d="M0 380 Q100 364 200 380 Q300 396 400 380 Q500 364 600 380 L700 375" fill="rgba(255,255,255,0.08)"/>
  <!-- Shallow turquoise near shore -->
  <ellipse cx="350" cy="345" rx="250" ry="20" fill="#5AC8E8" opacity="0.25"/>

  <!-- Small island -->
  <ellipse cx="350" cy="340" rx="280" ry="18" fill="#D8C880" opacity="0.7"/>
  <ellipse cx="350" cy="338" rx="260" ry="10" fill="#E8D898"/>

  <!-- Beach house on stilts -->
  <rect x="240" y="220" width="18" height="120" fill="#8A6840"/>
  <rect x="340" y="220" width="18" height="120" fill="#8A6840"/>
  <rect x="440" y="220" width="18" height="120" fill="#8A6840"/>

  <!-- House structure -->
  <rect x="180" y="120" width="340" height="115" rx="4" fill="#F0E8D8" stroke="#C8A868" stroke-width="2"/>
  <!-- Roof -->
  <path d="M165 125 L350 70 L535 125 Z" fill="#8A6840" opacity="0.9"/>
  <path d="M165 125 L350 70 L535 125" fill="none" stroke="#6A4820" stroke-width="2"/>

  <!-- Large sliding door on house -->
  <rect x="220" y="135" width="260" height="98" rx="4" fill="#2A6A90" stroke="#4A9AB8" stroke-width="2.5"/>
  <rect x="228" y="143" width="118" height="82" rx="2" fill="url(#keys_glass)"/>
  <rect x="234" y="150" width="18" height="58" rx="4" fill="white" opacity="0.28"/>
  <rect x="352" y="143" width="10" height="82" rx="2" fill="#2A6A90"/>
  <rect x="362" y="143" width="110" height="82" rx="2" fill="url(#keys_glass)" opacity="0.88"/>
  <rect x="369" y="150" width="18" height="58" rx="4" fill="white" opacity="0.32"/>
  <rect x="446" y="176" width="7" height="30" rx="3" fill="#5A9AB8"/>
  <!-- Track -->
  <rect x="218" y="231" width="264" height="6" rx="2" fill="#1A5A78"/>
  <circle cx="285" cy="234" r="5" fill="#C0D8E8" stroke="#4A8AB0" stroke-width="1.2"/>
  <circle cx="350" cy="234" r="5" fill="#C0D8E8" stroke="#4A8AB0" stroke-width="1.2"/>
  <circle cx="415" cy="234" r="5" fill="#C0D8E8" stroke="#4A8AB0" stroke-width="1.2"/>

  <!-- 316SS badge -->
  <rect x="260" y="148" width="68" height="20" rx="4" fill="#1B8FD6"/>
  <text x="294" y="161" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="800">316L MARINE SS</text>

  <!-- Palm trees -->
  <rect x="130" y="248" width="9" height="100" fill="#5A7840" opacity="0.8"/>
  <path d="M134 248 Q100 215 84 228 Q118 216 134 248 Z" fill="#6A9850" opacity="0.85"/>
  <path d="M134 248 Q168 212 182 226 Q150 214 134 248 Z" fill="#6A9850" opacity="0.85"/>
  <path d="M134 248 Q126 205 134 185 Q139 224 134 248 Z" fill="#7AAA60" opacity="0.85"/>

  <rect x="555" y="240" width="9" height="108" fill="#5A7840" opacity="0.8"/>
  <path d="M559 240 Q525 207 510 220 Q542 208 559 240 Z" fill="#6A9850" opacity="0.8"/>
  <path d="M559 240 Q594 204 608 218 Q578 206 559 240 Z" fill="#6A9850" opacity="0.8"/>
  <path d="M559 240 Q551 198 559 178 Q564 216 559 240 Z" fill="#7AAA60" opacity="0.8"/>

  <!-- Corrosion vs clean comparison badge -->
  <rect x="50" y="280" width="120" height="50" rx="6" fill="rgba(10,26,48,0.8)"/>
  <text x="110" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#FF8080">304 SS: 12–18 months</text>
  <text x="110" y="316" text-anchor="middle" font-family="Arial" font-size="9" fill="#4ADE80">316L SS: 10+ years</text>

  <rect x="0" y="468" width="700" height="52" fill="rgba(8,20,40,0.88)"/>
  <text x="350" y="491" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="white">Florida Keys</text>
  <text x="350" y="511" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#90C8E8">316L Marine-Grade Steel · Expedition Service · Key Largo to Key West</text>
</svg>